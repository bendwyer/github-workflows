---
name: flux-publish-oci

on:
  workflow_call:
    inputs:
      oci_repo:
        description: GHCR OCI repository path without component suffix (e.g. 'ghcr.io/bendwyer/d2-infra').
        required: true
        type: string
      artifact_path:
        description: Directory containing components (e.g. './components' for infra/apps). Leave as './' for repos published as a single artifact (e.g. fleet).
        required: false
        type: string
        default: ./
    secrets:
      ghcr_token:
        description: Token for GHCR authentication (typically secrets.GITHUB_TOKEN).
        required: true

permissions:
  contents: read
  packages: write
  id-token: write # For cosign keyless signing

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      components: ${{ steps.detect.outputs.components }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect components
        id: detect
        run: |
          if [ "${{ inputs.artifact_path }}" = "./" ]; then
            echo 'components=[""]' >> "$GITHUB_OUTPUT"
          else
            components=$(ls -d ${{ inputs.artifact_path }}/*/ | xargs -n1 basename | jq -R -s -c 'split("\n") | map(select(. != ""))')
            echo "components=${components}" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: detect
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        component: ${{ fromJSON(needs.detect.outputs.components) }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Flux CLI
        uses: controlplaneio-fluxcd/distribution/actions/setup@d055f6e0af475f179ab084bca4ab1896b47f18b6 # v2.8.8

      - name: Setup cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.ghcr_token }}

      - name: Push OCI artifact
        if: github.event_name != 'pull_request'
        uses: controlplaneio-fluxcd/distribution/actions/push@001776bbde2abbcc6c4f6b046412dee54721b0d2 # v2.9.2
        id: push
        with:
          repository: ${{ inputs.oci_repo }}${{ matrix.component != '' && format('/{0}', matrix.component) || '' }}
          path: ${{ matrix.component != '' && format('{0}/{1}', inputs.artifact_path, matrix.component) || inputs.artifact_path }}
          diff-tag: latest # Only push if different from :latest

      - name: Sign artifact
        if: github.event_name != 'pull_request' && steps.push.outputs.pushed == 'true'
        run: |
          for attempt in 1 2 3; do
            if cosign sign --yes "$DIGEST_URL"; then
              exit 0
            fi
            echo "::warning::cosign sign attempt ${attempt} failed; retrying in $((attempt * 10))s"
            sleep $((attempt * 10))
          done
          echo "::error::cosign sign failed after 3 attempts"
          exit 1
        env:
          DIGEST_URL: ${{ steps.push.outputs.digest-url }}

      - name: Validate artifact (PR only)
        if: github.event_name == 'pull_request'
        run: |
          echo "::notice::PR validation - ${{ matrix.component != '' && matrix.component || 'root' }} artifact build successful"
          flux push artifact oci://localhost:5000/test:pr --path="${{ matrix.component != '' && format('{0}/{1}', inputs.artifact_path, matrix.component) || inputs.artifact_path }}" || true
