---
name: omni-sync

on:
  workflow_call:
    inputs:
      omnictl_version:
        description: omnictl version (empty for latest).
        required: false
        type: string
        default: ""
      sops_version:
        description: SOPS version.
        required: true
        type: string
      cluster:
        description: Cluster to sync (empty for all).
        required: false
        type: string
        default: ""
      dry_run:
        description: Dry run only.
        required: false
        type: boolean
        default: false
      omni_endpoint:
        description: Omni API endpoint URL.
        required: true
        type: string
    secrets:
      SOPS_AGE_KEY:
        description: age private key for SOPS decryption.
        required: true
      OMNI_SERVICE_ACCOUNT_KEY:
        description: Omni service account key.
        required: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    env:
      OMNI_ENDPOINT: ${{ inputs.omni_endpoint }}
      OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install omnictl
        run: |
          if [[ -n "${{ inputs.omnictl_version }}" ]]; then
            url="https://github.com/siderolabs/omni/releases/download/v${{ inputs.omnictl_version }}/omnictl-linux-amd64"
          else
            url="https://github.com/siderolabs/omni/releases/latest/download/omnictl-linux-amd64"
          fi
          curl -Lo omnictl "$url"
          chmod +x omnictl
          sudo mv omnictl /usr/local/bin/

      - name: Install SOPS
        run: |
          curl -Lo sops "https://github.com/getsops/sops/releases/download/v${{ inputs.sops_version }}/sops-v${{ inputs.sops_version }}.linux.amd64"
          chmod +x sops
          sudo mv sops /usr/local/bin/

      - name: Configure SOPS
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt

      - name: Validate machine classes
        run: |
          if [[ -d machineclasses ]]; then
            for mc in machineclasses/*.yaml; do
              [[ -f "$mc" ]] || continue
              echo "Validating machine class: $mc"
              omnictl apply -f "$mc" --dry-run
            done
          fi

      - name: Mask secrets
        run: |
          # Registers sensitive values from SOPS-encrypted files with GitHub's
          # log masking (::add-mask::). Any registered value is replaced with ***
          # in all subsequent log output.
          #
          # Currently handles:
          #   - installationmedia jointoken — masks the Omni join token
          #   - cluster template inlineManifests[].contents — masks all Secret data values
          #   - patch files environment[] — masks env-var values whose key name
          #     contains KEY, TOKEN, SECRET, or AUTH (case-insensitive)

          # Mask installation media join tokens
          if [[ -d installationmedia ]]; then
            for im in installationmedia/*.yaml; do
              [[ -f "$im" ]] || continue
              grep -q '^sops:' "$im" 2>/dev/null || continue
              token=$(sops -d "$im" | yq '.spec.jointoken' 2>/dev/null)
              [[ -n "$token" && "$token" != "null" ]] && echo "::add-mask::$token"
            done
          fi

          # Mask Secret data values from cluster template inlineManifests
          for cluster_dir in clusters/*/; do
            [[ -d "$cluster_dir" ]] || continue
            cluster_file="$cluster_dir/cluster.yaml"
            [[ -f "$cluster_file" ]] || continue
            grep -q '^sops:' "$cluster_file" 2>/dev/null || continue

            decrypted=$(sops -d "$cluster_file")
            count=$(echo "$decrypted" | yq 'select(.kind == "ControlPlane") | .patches | length' 2>/dev/null)
            if [[ "$count" =~ ^[0-9]+$ ]] && [[ "$count" -gt 0 ]]; then
              for ((i=0; i<count; i++)); do
                echo "$decrypted" \
                  | yq "select(.kind == \"ControlPlane\") | .patches[$i].inline.cluster.inlineManifests[].contents" 2>/dev/null \
                  | yq -N 'select(. != null and . != "null") | select(has("data")) | .data[]' 2>/dev/null \
                  | while IFS= read -r val; do
                      [[ -n "$val" ]] && echo "::add-mask::$val"
                    done
              done
            fi
          done

          # Mask sensitive environment variables from sops-encrypted patch files
          if [[ -d patches ]]; then
            find patches -type f -name '*.yaml' 2>/dev/null | while IFS= read -r patch; do
              grep -q '^sops:' "$patch" 2>/dev/null || continue
              sops -d "$patch" \
                | yq '.environment[]' 2>/dev/null \
                | grep -iE '^[^=]*(KEY|TOKEN|SECRET|AUTH)=' \
                | cut -d= -f2- \
                | while IFS= read -r val; do
                    [[ -n "$val" ]] && echo "::add-mask::$val"
                  done || true
            done
          fi

      - name: Decrypt patches
        run: |
          # Decrypt sops-encrypted patch files in place so omnictl can resolve
          # `file:` references in cluster templates. Mask step above has already
          # registered sensitive values for log redaction.
          if [[ -d patches ]]; then
            find patches -type f -name '*.yaml' 2>/dev/null | while IFS= read -r patch; do
              grep -q '^sops:' "$patch" 2>/dev/null || continue
              echo "Decrypting: $patch"
              sops -d --in-place "$patch"
            done
          fi

      - name: Validate installation media
        run: |
          if [[ -d installationmedia ]]; then
            for im in installationmedia/*.yaml; do
              [[ -f "$im" ]] || continue
              echo "Validating installation media: $im"
              sops -d "$im" | omnictl apply -f /dev/stdin --dry-run
            done
          fi

      - name: Validate cluster templates
        run: |
          target_cluster="${{ inputs.cluster }}"

          for cluster_dir in clusters/*/; do
            [[ -d "$cluster_dir" ]] || continue
            cluster_name=$(basename "$cluster_dir")

            if [[ -n "$target_cluster" && "$cluster_name" != "$target_cluster" ]]; then
              continue
            fi

            echo "Validating cluster: $cluster_name"
            pushd "$cluster_dir" > /dev/null
            sops -d cluster.yaml | omnictl cluster template validate -f /dev/stdin
            popd > /dev/null
          done

  sync:
    needs: validate
    runs-on: ubuntu-24.04
    env:
      OMNI_ENDPOINT: ${{ inputs.omni_endpoint }}
      OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install omnictl
        run: |
          if [[ -n "${{ inputs.omnictl_version }}" ]]; then
            url="https://github.com/siderolabs/omni/releases/download/v${{ inputs.omnictl_version }}/omnictl-linux-amd64"
          else
            url="https://github.com/siderolabs/omni/releases/latest/download/omnictl-linux-amd64"
          fi
          curl -Lo omnictl "$url"
          chmod +x omnictl
          sudo mv omnictl /usr/local/bin/

      - name: Install SOPS
        run: |
          curl -Lo sops "https://github.com/getsops/sops/releases/download/v${{ inputs.sops_version }}/sops-v${{ inputs.sops_version }}.linux.amd64"
          chmod +x sops
          sudo mv sops /usr/local/bin/

      - name: Configure SOPS
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt

      - name: Mask secrets
        run: |
          # See the identical step in the validate job for full documentation.

          # Mask installation media join tokens
          if [[ -d installationmedia ]]; then
            for im in installationmedia/*.yaml; do
              [[ -f "$im" ]] || continue
              grep -q '^sops:' "$im" 2>/dev/null || continue
              token=$(sops -d "$im" | yq '.spec.jointoken' 2>/dev/null)
              [[ -n "$token" && "$token" != "null" ]] && echo "::add-mask::$token"
            done
          fi

          # Mask Secret data values from cluster template inlineManifests
          for cluster_dir in clusters/*/; do
            [[ -d "$cluster_dir" ]] || continue
            cluster_file="$cluster_dir/cluster.yaml"
            [[ -f "$cluster_file" ]] || continue
            grep -q '^sops:' "$cluster_file" 2>/dev/null || continue

            decrypted=$(sops -d "$cluster_file")
            count=$(echo "$decrypted" | yq 'select(.kind == "ControlPlane") | .patches | length' 2>/dev/null)
            if [[ "$count" =~ ^[0-9]+$ ]] && [[ "$count" -gt 0 ]]; then
              for ((i=0; i<count; i++)); do
                echo "$decrypted" \
                  | yq "select(.kind == \"ControlPlane\") | .patches[$i].inline.cluster.inlineManifests[].contents" 2>/dev/null \
                  | yq -N 'select(. != null and . != "null") | select(has("data")) | .data[]' 2>/dev/null \
                  | while IFS= read -r val; do
                      [[ -n "$val" ]] && echo "::add-mask::$val"
                    done
              done
            fi
          done

          # Mask sensitive environment variables from sops-encrypted patch files
          if [[ -d patches ]]; then
            find patches -type f -name '*.yaml' 2>/dev/null | while IFS= read -r patch; do
              grep -q '^sops:' "$patch" 2>/dev/null || continue
              sops -d "$patch" \
                | yq '.environment[]' 2>/dev/null \
                | grep -iE '^[^=]*(KEY|TOKEN|SECRET|AUTH)=' \
                | cut -d= -f2- \
                | while IFS= read -r val; do
                    [[ -n "$val" ]] && echo "::add-mask::$val"
                  done || true
            done
          fi

      - name: Decrypt patches
        run: |
          # Decrypt sops-encrypted patch files in place so omnictl can resolve
          # `file:` references in cluster templates. Mask step above has already
          # registered sensitive values for log redaction.
          if [[ -d patches ]]; then
            find patches -type f -name '*.yaml' 2>/dev/null | while IFS= read -r patch; do
              grep -q '^sops:' "$patch" 2>/dev/null || continue
              echo "Decrypting: $patch"
              sops -d --in-place "$patch"
            done
          fi

      - name: Apply machine classes
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            dry_run="true"
          else
            dry_run="${{ inputs.dry_run }}"
          fi

          if [[ -d machineclasses ]]; then
            for mc in machineclasses/*.yaml; do
              [[ -f "$mc" ]] || continue
              echo "Applying machine class: $mc"
              if [[ "$dry_run" == "true" ]]; then
                omnictl apply -f "$mc" --dry-run
              else
                omnictl apply -f "$mc"
              fi
            done
          fi

      - name: Apply installation media
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            dry_run="true"
          else
            dry_run="${{ inputs.dry_run }}"
          fi

          if [[ -d installationmedia ]]; then
            for im in installationmedia/*.yaml; do
              [[ -f "$im" ]] || continue
              echo "Applying installation media: $im"
              if [[ "$dry_run" == "true" ]]; then
                sops -d "$im" | omnictl apply -f /dev/stdin --dry-run
              else
                sops -d "$im" | omnictl apply -f /dev/stdin
              fi
            done
          fi

      - name: Sync cluster templates
        run: |
          target_cluster="${{ inputs.cluster }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            dry_run="true"
          else
            dry_run="${{ inputs.dry_run }}"
          fi

          for cluster_dir in clusters/*/; do
            [[ -d "$cluster_dir" ]] || continue
            cluster_name=$(basename "$cluster_dir")

            if [[ -n "$target_cluster" && "$cluster_name" != "$target_cluster" ]]; then
              continue
            fi

            echo "Syncing cluster: $cluster_name"
            pushd "$cluster_dir" > /dev/null

            if [[ "$dry_run" == "true" ]]; then
              sops -d cluster.yaml | omnictl cluster template sync -f /dev/stdin --dry-run
            else
              sops -d cluster.yaml | omnictl cluster template sync -f /dev/stdin
            fi

            popd > /dev/null
          done
