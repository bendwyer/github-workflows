---
name: omni-bootstrap

on:
  workflow_call:
    inputs:
      cluster:
        description: Cluster to bootstrap.
        required: true
        type: string
      omnictl_version:
        description: omnictl version (empty for latest).
        required: false
        type: string
        default: ""
      omni_endpoint:
        description: Omni API endpoint URL.
        required: true
        type: string
      omni_service_account_user:
        description: Omni service account user for kubeconfig.
        required: true
        type: string
    secrets:
      OMNI_SERVICE_ACCOUNT_KEY:
        description: Omni service account key.
        required: true

jobs:
  bootstrap:
    runs-on: ubuntu-24.04
    env:
      OMNI_ENDPOINT: ${{ inputs.omni_endpoint }}
      OMNI_SERVICE_ACCOUNT_KEY: ${{ secrets.OMNI_SERVICE_ACCOUNT_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install omnictl
        run: |
          if [[ -n "${{ inputs.omnictl_version }}" ]]; then
            url="https://github.com/siderolabs/omni/releases/download/v${{ inputs.omnictl_version }}/omnictl-linux-amd64"
          else
            url="https://github.com/siderolabs/omni/releases/latest/download/omnictl-linux-amd64"
          fi
          curl -Lo omnictl "$url"
          chmod +x omnictl
          sudo mv omnictl /usr/local/bin/

      - name: Install Helm and Helmfile
        uses: helmfile/helmfile-action@54b1d14bdfb9ae815b1f4ef213273a9025b6bdee # v2.4.6
        with:
          helmfile-args: version

      - name: Get kubeconfig
        run: |
          omnictl kubeconfig -c ${{ inputs.cluster }} --force --service-account --user ${{ inputs.omni_service_account_user }}
          kubectl get nodes

      - name: Bootstrap
        run: |
          clusters/${{ inputs.cluster }}/bootstrap/bootstrap.sh
