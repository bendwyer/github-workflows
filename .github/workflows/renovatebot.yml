---
name: renovatebot

on:
  workflow_call:
    inputs:
      gh_app_id:
        description: GitHub App ID.
        required: true
        type: string
      renovate_file:
        description: Path to the Renovate configuration file.
        required: false
        default: .github/renovate.json
        type: string
    secrets:
      gh_app_private_key:
        description: GitHub App private key.
        required: true

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        id: app_token
        with:
          app-id: ${{ inputs.gh_app_id }}
          private-key: ${{ secrets.gh_app_private_key }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Run Renovate
        uses: renovatebot/github-action@eb932558ad942cccfd8211cf535f17ff183a9f74 # v46.1.9
        with:
          configurationFile: ${{ inputs.renovate_file }}
          token: ${{ steps.app_token.outputs.token }}
        env:
          RENOVATE_PLATFORM_COMMIT: 'true'
          LOG_LEVEL: 'debug'
          RENOVATE_REPOSITORIES: '["${{ github.repository }}"]'
