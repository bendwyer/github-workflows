---
name: renovatebot

on:
  workflow_call:
    inputs:
      gh_client_id:
        description: GitHub App client ID (preferred; takes precedence if both are set).
        required: false
        type: string
        default: ''
      renovate_file:
        description: Path to the Renovate configuration file.
        required: false
        default: .github/renovate.json
        type: string
    secrets:
      gh_app_private_key:
        description: GitHub App private key.
        required: true

jobs:
  renovate:
    runs-on: ubuntu-24.04
    steps:
      - name: Generate GitHub App token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app_token
        with:
          client-id: ${{ inputs.gh_client_id }}
          private-key: ${{ secrets.gh_app_private_key }}
          permission-contents: write
          permission-issues: write
          permission-pull-requests: write
          permission-statuses: write
          permission-vulnerability-alerts: read

      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Run Renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          configurationFile: ${{ inputs.renovate_file }}
          token: ${{ steps.app_token.outputs.token }}
        env:
          RENOVATE_PLATFORM_COMMIT: 'true'
          LOG_LEVEL: 'debug'
          RENOVATE_REPOSITORIES: '["${{ github.repository }}"]'
          RENOVATE_ALLOWED_COMMANDS: '["^jb update$"]'
