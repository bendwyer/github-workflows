---
name: github-detect-changes

on:
  workflow_call:
    inputs:
      filter_file_path:
        description: Path to a YAML file populated with filters.
        required: false
        default: .github/filters.yml
        type: string
    outputs:
      changes:
        description: JSON array with names of filters matching changed files.
        value: ${{ jobs.detect.outputs.changes }}

jobs:
  detect:
    runs-on: ubuntu-24.04
    outputs:
      changes: ${{ steps.filter.outputs.changes }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Detect changed paths
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v3.0.0
        id: filter
        with:
          filters: ${{ inputs.filter_file_path }}
