---
name: talos-sync

on:
  workflow_call:
    inputs:
      talosctl_version:
        description: talosctl version.
        required: true
        type: string
      sops_version:
        description: SOPS version.
        required: true
        type: string
      cluster:
        description: Cluster to sync (empty for all).
        required: false
        type: string
        default: ""
      dry_run:
        description: Dry run only.
        required: false
        type: boolean
        default: false
      ts_oauth_client_id:
        description: Tailscale OAuth client ID.
        required: true
        type: string
    secrets:
      SOPS_AGE_KEY:
        description: age private key for SOPS decryption.
        required: true
      TS_OAUTH_SECRET:
        description: Tailscale OAuth client secret.
        required: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install talosctl
        run: |
          curl -Lo talosctl "https://github.com/siderolabs/talos/releases/download/v${{ inputs.talosctl_version }}/talosctl-linux-amd64"
          chmod +x talosctl
          sudo mv talosctl /usr/local/bin/

      - name: Install SOPS
        run: |
          curl -Lo sops "https://github.com/getsops/sops/releases/download/v${{ inputs.sops_version }}/sops-v${{ inputs.sops_version }}.linux.amd64"
          chmod +x sops
          sudo mv sops /usr/local/bin/

      - name: Configure SOPS
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt

      - name: Mask secrets
        run: |
          # Registers sensitive values from SOPS-encrypted patches with GitHub's
          # log masking (::add-mask::). Any registered value is replaced with ***
          # in all subsequent log output, keeping config diffs readable while
          # preventing credential leaks.
          #
          # Currently handles two patch formats automatically:
          #   - cluster.inlineManifests[].contents — masks all Secret data values
          #   - ExtensionServiceConfig environment[] — masks values whose variable
          #     names contain KEY, TOKEN, SECRET, or AUTH (case-insensitive)
          #
          # Adding a new secret patch:
          #   - If it uses either format above, no changes needed.
          #   - If it introduces a new format, add an extraction block below.

          for cluster_dir in clusters/*/; do
            [[ -d "$cluster_dir" ]] || continue

            for patch in "$cluster_dir"/patches/*.yaml; do
              [[ -f "$patch" ]] || continue
              grep -q '^sops:' "$patch" 2>/dev/null || continue
              decrypted=$(sops -d "$patch")

              # Mask Secret data values from inlineManifests
              count=$(echo "$decrypted" | yq '.cluster.inlineManifests | length' 2>/dev/null)
              if [[ "$count" =~ ^[0-9]+$ ]] && [[ "$count" -gt 0 ]]; then
                for ((i=0; i<count; i++)); do
                  echo "$decrypted" \
                    | yq ".cluster.inlineManifests[$i].contents" 2>/dev/null \
                    | yq -N 'select(has("data")) | .data[]' 2>/dev/null \
                    | while IFS= read -r val; do
                        [[ -n "$val" ]] && echo "::add-mask::$val"
                      done
                done
              fi

              # Mask sensitive environment variables
              echo "$decrypted" \
                | yq '.environment[]' 2>/dev/null \
                | grep -iE '^[^=]*(KEY|TOKEN|SECRET|AUTH)=' \
                | cut -d= -f2- \
                | while IFS= read -r val; do
                    [[ -n "$val" ]] && echo "::add-mask::$val"
                  done || true
            done
          done

      - name: Validate configs
        run: |
          target_cluster="${{ inputs.cluster }}"
          decrypted_dir=$(mktemp -d)

          for cluster_dir in clusters/*/; do
            [[ -d "$cluster_dir" ]] || continue
            cluster_name=$(basename "$cluster_dir")

            if [[ -n "$target_cluster" && "$cluster_name" != "$target_cluster" ]]; then
              continue
            fi

            echo "Validating cluster: $cluster_name"

            # Read cluster config
            config="$cluster_dir/config.yaml"
            if [[ ! -f "$config" ]]; then
              echo "Error: config.yaml not found at $config"
              exit 1
            fi
            endpoint=$(yq '.endpoint' "$config")
            kubernetes_version=$(yq '.kubernetes_version' "$config")
            talos_version=$(yq '.talos_version' "$config")

            # Decrypt secrets
            secrets="$cluster_dir/secrets.yaml"
            if [[ ! -f "$secrets" ]]; then
              echo "Error: secrets.yaml not found at $secrets"
              exit 1
            fi
            sops -d "$secrets" > "$decrypted_dir/secrets.yaml"

            # Collect patch args, decrypting encrypted ones
            patch_args=()
            for patch in "$cluster_dir"/patches/*.yaml; do
              [[ -f "$patch" ]] || continue
              patch_name=$(basename "$patch")
              if grep -q '^sops:' "$patch" 2>/dev/null; then
                echo "  Including (encrypted): $patch_name"
                sops -d "$patch" > "$decrypted_dir/$patch_name"
                patch_args+=(--config-patch "@$decrypted_dir/$patch_name")
              else
                echo "  Including: $patch_name"
                patch_args+=(--config-patch "@$patch")
              fi
            done

            # Generate config and validate
            talosctl gen config \
              --with-secrets "$decrypted_dir/secrets.yaml" \
              --kubernetes-version "$kubernetes_version" \
              --talos-version "$talos_version" \
              "$cluster_name" "$endpoint" \
              "${patch_args[@]}" \
              --output "$decrypted_dir/controlplane.yaml" \
              --output-types controlplane

            talosctl validate -m metal -c "$decrypted_dir/controlplane.yaml"
            echo "Validation passed"

            rm -f "$decrypted_dir/controlplane.yaml" "$decrypted_dir"/*.yaml
          done

          rm -rf "$decrypted_dir"

  sync:
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install talosctl
        run: |
          curl -Lo talosctl "https://github.com/siderolabs/talos/releases/download/v${{ inputs.talosctl_version }}/talosctl-linux-amd64"
          chmod +x talosctl
          sudo mv talosctl /usr/local/bin/

      - name: Install SOPS
        run: |
          curl -Lo sops "https://github.com/getsops/sops/releases/download/v${{ inputs.sops_version }}/sops-v${{ inputs.sops_version }}.linux.amd64"
          chmod +x sops
          sudo mv sops /usr/local/bin/

      - name: Configure SOPS
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt

      - name: Connect to Tailscale
        uses: tailscale/github-action@306e68a486fd2350f2bfc3b19fcd143891a4a2d8 # v4.1.2
        with:
          oauth-client-id: ${{ inputs.ts_oauth_client_id }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github

      - name: Mask secrets
        run: |
          # See the identical step in the validate job for full documentation.

          for cluster_dir in clusters/*/; do
            [[ -d "$cluster_dir" ]] || continue

            for patch in "$cluster_dir"/patches/*.yaml; do
              [[ -f "$patch" ]] || continue
              grep -q '^sops:' "$patch" 2>/dev/null || continue
              decrypted=$(sops -d "$patch")

              count=$(echo "$decrypted" | yq '.cluster.inlineManifests | length' 2>/dev/null)
              if [[ "$count" =~ ^[0-9]+$ ]] && [[ "$count" -gt 0 ]]; then
                for ((i=0; i<count; i++)); do
                  echo "$decrypted" \
                    | yq ".cluster.inlineManifests[$i].contents" 2>/dev/null \
                    | yq -N 'select(has("data")) | .data[]' 2>/dev/null \
                    | while IFS= read -r val; do
                        [[ -n "$val" ]] && echo "::add-mask::$val"
                      done
                done
              fi

              echo "$decrypted" \
                | yq '.environment[]' 2>/dev/null \
                | grep -iE '^[^=]*(KEY|TOKEN|SECRET|AUTH)=' \
                | cut -d= -f2- \
                | while IFS= read -r val; do
                    [[ -n "$val" ]] && echo "::add-mask::$val"
                  done || true
            done
          done

      - name: Apply config
        run: |
          target_cluster="${{ inputs.cluster }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            dry_run="true"
          else
            dry_run="${{ inputs.dry_run }}"
          fi

          decrypted_dir=$(mktemp -d)

          for cluster_dir in clusters/*/; do
            [[ -d "$cluster_dir" ]] || continue
            cluster_name=$(basename "$cluster_dir")

            if [[ -n "$target_cluster" && "$cluster_name" != "$target_cluster" ]]; then
              continue
            fi

            echo "Syncing cluster: $cluster_name"

            # Read cluster config
            config="$cluster_dir/config.yaml"
            endpoint=$(yq '.endpoint' "$config")
            kubernetes_version=$(yq '.kubernetes_version' "$config")
            talos_version=$(yq '.talos_version' "$config")

            # Decrypt secrets
            sops -d "$cluster_dir/secrets.yaml" > "$decrypted_dir/secrets.yaml"

            # Locate talosconfig and determine node address
            talosconfig="$cluster_dir/talosconfig.yaml"
            if [[ ! -f "$talosconfig" ]]; then
              echo "Error: talosconfig not found at $talosconfig"
              exit 1
            fi
            sops -d "$talosconfig" > "$decrypted_dir/talosconfig"
            node=$(yq '.contexts[.context].endpoints[0]' "$decrypted_dir/talosconfig")
            echo "Target node: $node"

            # Wait for tailnet peer visibility
            echo "  Waiting for peer connectivity..."
            tailscale ping --timeout=60s "$node"

            # Collect patch args, decrypting encrypted ones
            patch_args=()
            for patch in "$cluster_dir"/patches/*.yaml; do
              [[ -f "$patch" ]] || continue
              patch_name=$(basename "$patch")
              if grep -q '^sops:' "$patch" 2>/dev/null; then
                echo "  Including (encrypted): $patch_name"
                sops -d "$patch" > "$decrypted_dir/$patch_name"
                patch_args+=(--config-patch "@$decrypted_dir/$patch_name")
              else
                echo "  Including: $patch_name"
                patch_args+=(--config-patch "@$patch")
              fi
            done

            # Generate the full machine config from secrets + patches
            talosctl gen config \
              --with-secrets "$decrypted_dir/secrets.yaml" \
              --kubernetes-version "$kubernetes_version" \
              --talos-version "$talos_version" \
              "$cluster_name" "$endpoint" \
              "${patch_args[@]}" \
              --output "$decrypted_dir/controlplane.yaml" \
              --output-types controlplane

            # Apply the generated config
            dry_run_flag=""
            if [[ "$dry_run" == "true" ]]; then
              dry_run_flag="--dry-run"
            fi

            echo "  Applying config (dry_run=$dry_run)..."
            talosctl apply-config \
              --talosconfig "$decrypted_dir/talosconfig" \
              --nodes "$node" \
              --file "$decrypted_dir/controlplane.yaml" \
              --mode=no-reboot $dry_run_flag

            # Clean up decrypted files
            rm -f "$decrypted_dir/controlplane.yaml" "$decrypted_dir"/*.yaml "$decrypted_dir/talosconfig"
          done

          rm -rf "$decrypted_dir"
