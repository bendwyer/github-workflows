---
name: talos-sync

on:
  workflow_call:
    inputs:
      talosctl_version:
        description: talosctl version.
        required: true
        type: string
      sops_version:
        description: SOPS version.
        required: true
        type: string
      cluster:
        description: Cluster to sync (empty for all).
        required: false
        type: string
        default: ""
      dry_run:
        description: Dry run only.
        required: false
        type: boolean
        default: false
      ts_oauth_client_id:
        description: Tailscale OAuth client ID.
        required: true
        type: string
    secrets:
      SOPS_AGE_KEY:
        description: age private key for SOPS decryption.
        required: true
      TS_OAUTH_SECRET:
        description: Tailscale OAuth client secret.
        required: true

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install talosctl
        run: |
          curl -Lo talosctl "https://github.com/siderolabs/talos/releases/download/v${{ inputs.talosctl_version }}/talosctl-linux-amd64"
          chmod +x talosctl
          sudo mv talosctl /usr/local/bin/

      - name: Install SOPS
        run: |
          curl -Lo sops "https://github.com/getsops/sops/releases/download/v${{ inputs.sops_version }}/sops-v${{ inputs.sops_version }}.linux.amd64"
          chmod +x sops
          sudo mv sops /usr/local/bin/

      - name: Configure SOPS
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt

      - name: Validate configs
        run: |
          target_cluster="${{ inputs.cluster }}"
          decrypted_dir=$(mktemp -d)

          for cluster_dir in clusters/*/; do
            [[ -d "$cluster_dir" ]] || continue
            cluster_name=$(basename "$cluster_dir")

            if [[ -n "$target_cluster" && "$cluster_name" != "$target_cluster" ]]; then
              continue
            fi

            echo "Validating cluster: $cluster_name"

            # Read cluster config
            config="$cluster_dir/config.yaml"
            if [[ ! -f "$config" ]]; then
              echo "Error: config.yaml not found at $config"
              exit 1
            fi
            endpoint=$(yq '.endpoint' "$config")
            kubernetes_version=$(yq '.kubernetes_version' "$config")
            talos_version=$(yq '.talos_version' "$config")

            # Decrypt secrets
            secrets="$cluster_dir/secrets.yaml"
            if [[ ! -f "$secrets" ]]; then
              echo "Error: secrets.yaml not found at $secrets"
              exit 1
            fi
            sops -d "$secrets" > "$decrypted_dir/secrets.yaml"

            # Collect patch args, decrypting encrypted ones
            patch_args=()
            for patch in "$cluster_dir"/patches/*.yaml; do
              [[ -f "$patch" ]] || continue
              patch_name=$(basename "$patch")
              if grep -q '^sops:' "$patch" 2>/dev/null; then
                echo "  Including (encrypted): $patch_name"
                sops -d "$patch" > "$decrypted_dir/$patch_name"
                patch_args+=(--config-patch "@$decrypted_dir/$patch_name")
              else
                echo "  Including: $patch_name"
                patch_args+=(--config-patch "@$patch")
              fi
            done

            # Generate config and validate
            talosctl gen config \
              --with-secrets "$decrypted_dir/secrets.yaml" \
              --kubernetes-version "$kubernetes_version" \
              --talos-version "$talos_version" \
              "$cluster_name" "$endpoint" \
              "${patch_args[@]}" \
              --output "$decrypted_dir/output" \
              --output-types controlplane

            talosctl validate -m metal -c "$decrypted_dir/output/controlplane.yaml"
            echo "Validation passed"

            rm -rf "$decrypted_dir/output" "$decrypted_dir"/*.yaml
          done

          rm -rf "$decrypted_dir"

  sync:
    needs: validate
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install talosctl
        run: |
          curl -Lo talosctl "https://github.com/siderolabs/talos/releases/download/v${{ inputs.talosctl_version }}/talosctl-linux-amd64"
          chmod +x talosctl
          sudo mv talosctl /usr/local/bin/

      - name: Install SOPS
        run: |
          curl -Lo sops "https://github.com/getsops/sops/releases/download/v${{ inputs.sops_version }}/sops-v${{ inputs.sops_version }}.linux.amd64"
          chmod +x sops
          sudo mv sops /usr/local/bin/

      - name: Configure SOPS
        run: |
          mkdir -p ~/.config/sops/age
          echo "${{ secrets.SOPS_AGE_KEY }}" > ~/.config/sops/age/keys.txt

      - name: Connect to Tailscale
        uses: tailscale/github-action@6cae46e2d796f265265cfcf628b72a32b4d7cade # v3
        with:
          oauth-client-id: ${{ inputs.ts_oauth_client_id }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:github

      - name: Apply config
        run: |
          target_cluster="${{ inputs.cluster }}"
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            dry_run="true"
          else
            dry_run="${{ inputs.dry_run }}"
          fi

          decrypted_dir=$(mktemp -d)

          for cluster_dir in clusters/*/; do
            [[ -d "$cluster_dir" ]] || continue
            cluster_name=$(basename "$cluster_dir")

            if [[ -n "$target_cluster" && "$cluster_name" != "$target_cluster" ]]; then
              continue
            fi

            echo "Syncing cluster: $cluster_name"

            # Read cluster config
            config="$cluster_dir/config.yaml"
            endpoint=$(yq '.endpoint' "$config")
            kubernetes_version=$(yq '.kubernetes_version' "$config")
            talos_version=$(yq '.talos_version' "$config")

            # Decrypt secrets
            sops -d "$cluster_dir/secrets.yaml" > "$decrypted_dir/secrets.yaml"

            # Locate talosconfig and determine node address
            talosconfig="$cluster_dir/talosconfig.yaml"
            if [[ ! -f "$talosconfig" ]]; then
              echo "Error: talosconfig not found at $talosconfig"
              exit 1
            fi
            sops -d "$talosconfig" > "$decrypted_dir/talosconfig"
            node=$(yq '.contexts[.context].endpoints[0]' "$decrypted_dir/talosconfig")
            echo "Target node: $node"

            # Wait for tailnet peer visibility
            echo "  Waiting for peer connectivity..."
            tailscale ping --timeout=60s "$node"

            # Collect patch args, decrypting encrypted ones
            patch_args=()
            for patch in "$cluster_dir"/patches/*.yaml; do
              [[ -f "$patch" ]] || continue
              patch_name=$(basename "$patch")
              if grep -q '^sops:' "$patch" 2>/dev/null; then
                echo "  Including (encrypted): $patch_name"
                sops -d "$patch" > "$decrypted_dir/$patch_name"
                patch_args+=(--config-patch "@$decrypted_dir/$patch_name")
              else
                echo "  Including: $patch_name"
                patch_args+=(--config-patch "@$patch")
              fi
            done

            # Generate the full machine config from secrets + patches
            talosctl gen config \
              --with-secrets "$decrypted_dir/secrets.yaml" \
              --kubernetes-version "$kubernetes_version" \
              --talos-version "$talos_version" \
              "$cluster_name" "$endpoint" \
              "${patch_args[@]}" \
              --output "$decrypted_dir/output" \
              --output-types controlplane

            # Apply the generated config
            dry_run_flag=""
            if [[ "$dry_run" == "true" ]]; then
              dry_run_flag="--dry-run"
            fi

            echo "  Applying config (dry_run=$dry_run)..."
            talosctl apply-config \
              --talosconfig "$decrypted_dir/talosconfig" \
              --nodes "$node" \
              --file "$decrypted_dir/output/controlplane.yaml" \
              --mode=no-reboot $dry_run_flag

            # Clean up decrypted files
            rm -rf "$decrypted_dir/output" "$decrypted_dir"/*.yaml "$decrypted_dir/talosconfig"
          done

          rm -rf "$decrypted_dir"
